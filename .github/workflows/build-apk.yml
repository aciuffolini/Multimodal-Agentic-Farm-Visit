name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.8-fix)'
        required: false
        default: 'v1.0.8-fix'
  push:
    tags:
      - 'v*'
      - 'v*-fix'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build shared package
        run: pnpm --filter @farm-visit/shared run build
      
      - name: Build web app for Android
        run: pnpm --filter @farm-visit/web run build:android
      
      - name: Verify build output
        run: |
          if [ ! -f "apps/web/dist/index.html" ]; then
            echo "❌ dist/index.html not found!"
            ls -la apps/web/dist/ 2>/dev/null || echo "dist directory does not exist"
            exit 1
          fi
          echo "✅ Web build verified"
          
          # Verify no service worker (Android builds shouldn't have one)
          if [ -f "apps/web/dist/sw.js" ]; then
            echo "⚠️ Service worker found in Android build - this may cause caching issues"
          else
            echo "✅ No service worker (correct for Android)"
          fi
      
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@^6.0.2
      
      - name: Sync Capacitor Android
        run: |
          cd apps/web
          npx cap sync android
          echo "✅ Capacitor sync completed"
      
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses 2>&1 | head -20 || true
        continue-on-error: true
      
      - name: Install required Android components
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | head -30 || true
        continue-on-error: true
      
      - name: Clean Gradle caches (fix bcprov-jdk18on corruption)
        run: |
          rm -rf ~/.gradle/caches/jars-*
          rm -rf ~/.gradle/caches/transforms-*

      - name: Build Android APK
        run: |
          cd apps/web/android
          chmod +x gradlew
          ./gradlew clean --no-daemon 2>&1 | tail -5 || true
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log || {
            echo "❌ Gradle build failed"
            tail -100 build.log
            exit 1
          }
          echo "✅ APK build completed"

      - name: Upload Gradle Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-error-log
          path: apps/web/android/build.log
          retention-days: 5
      
      - name: Verify APK exists
        run: |
          APK_PATH="apps/web/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK found!"
            ls -lh "$APK_PATH"
          else
            echo "❌ APK not found at: $APK_PATH"
            find apps/web/android -name "*.apk" -type f || echo "No APK files found"
            exit 1
          fi
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: farm-visit-apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Get version from tag or input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="v1.0.8-fix"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"
      
      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Farm Visit App ${{ steps.get_version.outputs.version }}
          files: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
          body: |
            🎉 Release ${{ steps.get_version.outputs.version }}
            
            ## 📱 Instalación Android
            
            1. Descargar APK desde abajo
            2. Habilitar "Fuentes desconocidas" en Settings → Security
            3. Instalar APK
            4. Ingresar contraseña cuando se solicite
            
            ## ✨ Características
            
            - GPS, Cámara, Micrófono (con permisos completos)
            - Extracción de datos con IA (Gemini Nano)
            - Mapa KMZ/KML
            - Offline-first PWA
            - Multi-agente system (swarm)
            - Chatbot mejorado con respuestas contextuales
            
            ## 📧 Contacto
            
            Para permisos y acceso: **aciuffolini@teknal.com.ar**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
